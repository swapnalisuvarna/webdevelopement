<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>HTML Form1 </title>
</head>
<body>
    <div>
    <form action="">
        <h3>Event Registration</h3>
        <label for="name">Name:</label><br>
        <input type="text" name="name" id="name"><br>
        <label for="email">Email:</label><br>
        <input type="email" name="email" id="email"><br>
        <label for="phone">Phone:</label><br>
        <input type="tel" name="phone" id=""><br>
        <label for="occu">Occupation:</label>
        <select name="occu" id="occu">
            <option value="farming">Farming</option>
            <option value="IT engineer">IT Engineer</option>
            <option value="Doctor">Doctor</option>
            <option value="other" selected>Other</option>
        </select><br>
        <label for="interest">Topics of Interest:</label>
        <input type="checkbox" name="html" id="interest">
        <label for="interest">HTML</label>
         <input type="checkbox" name="css" id="interest">
        <label for="interest">CSS</label>
         <input type="checkbox" name="js" id="interest">
        <label for="interest">JS</label><br>
        <label for="ta">Comments:</label><br>
        <textarea name="ta" id="ta" rows="5" cols="30"></textarea><br>
        <input type="submit" value="submit">
    </form></div>
</body>
</html>
