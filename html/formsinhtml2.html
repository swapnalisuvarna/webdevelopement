<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>HTML Form1 </title>
    <style>
.abc{
    margin: 100px auto;
   text-align: center;
    background-color: bisque;
    width:400px auto;
    height: 400px auto;
}
h3{
    padding-top: 10px;
    
}
    </style>
</head>
<body>
    <div class="abc">
    <form action="">
        <h3>Event Registration</h3>
        <label for="name">Name:</label><br>
        <input type="text" name="name" id="name"><br>
        <label for="email">Email:</label><br>
        <input type="email" name="email" id="email"><br>
        <label for="phone">Phone:</label><br>
        <input type="tel" name="phone" id=""><br>
        <label for="occu">Occupation:</label>
        <select name="occu" id="occu">
            <option value="farming">Farming</option>
            <option value="IT engineer">IT Engineer</option>
            <option value="Doctor">Doctor</option>
            <option value="other" selected>Other</option>
        </select><br>
        <fieldset>
        <legend>Skills</legend>
        <input type="checkbox" name="html" id="html">
<label for="html">HTML</label>

<input type="checkbox" name="css" id="css">
<label for="css">CSS</label>

<input type="checkbox" name="js" id="js">
<label for="js">JS</label><br></fieldset>
        <br>
        <label for="resume">Resume:</label>
        <input type="file" name="resume" id="resume"><br>
        <label for="exper">Experience</label>
        <input type="number" name="exper" id="exper" min="0"><br>
       
        
        <label>Availability:</label>
<input type="radio" name="availability" id="fulltime">
<label for="fulltime">Full Time</label>

<input type="radio" name="availability" id="parttime">
<label for="parttime">Part Time</label><br>
<label for="ta">Comments:</label><br>
        <textarea name="ta" id="ta" rows="5" cols="30"></textarea><br>
        <input type="submit" value="submit">
    </form></div>
</body>
</html>
