<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Example</title>
    <style>
        header, nav, section, article, footer {
            border: 1px solid black;
            margin: 10px;
            padding: 10px;
        }

        header {
            background-color: lightblue;
        }

        nav {
            background-color: lightgreen;
        }

        section {
            background-color: lightyellow;
        }

        article {
            background-color: lightpink;
        }

        footer {
            background-color: lightgray;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
        <p>Welcome to my page</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main Section -->
    <section>
        <h2>Latest Articles</h2>

        <!-- Article 1 -->
        <article>
            <h3>HTML Basics</h3>
            <p>This article explains basic HTML structure.</p>
        </article>

        <!-- Article 2 -->
        <article>
            <h3>CSS Styling</h3>
            <p>This article explains how to style web pages.</p>
        </article>

    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website | All rights reserved</p>
    </footer>

</body>
</html>
